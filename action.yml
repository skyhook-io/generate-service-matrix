name: 'Generate Service Matrix'
description: 'Generates build and deploy matrices from .skyhook/skyhook.yaml with optional remote deployment repo discovery'
author: 'Skyhook'
 
branding:
  icon: 'grid'
  color: 'purple'

inputs:
  overlay:
    description: 'The overlay/environment to use for kustomize (e.g., dev, staging, production). If not provided, all environments will be included.'
    required: false
  branch:
    description: 'The branch to use for deployment. If not provided, uses the remote default branch (HEAD).'
    required: false
  tag:
    description: 'The image tag to deploy'
    required: true
  github-token:
    description: 'GitHub token for API access'
    required: true
  repo-path:
    description: 'The path to the repo'
    required: false
    default: '.'
  on-discovery-failure:
    description: 'How to handle service discovery failures (e.g. deployment repo clone errors). "fail" aborts the entire action. "skip" excludes services with incomplete metadata from the output with warning logs.'
    required: false
    default: 'skip'
  kustomize-image-fallback:
    description: >
      Enable heuristic fallback for kustomize image resolution.
      By default, images are matched by exact name (images[].name === service name).
      When set to "true", if no exact match is found and the kustomization file
      contains exactly one image entry, that image is used (preferring newName, then name).
      Files with multiple images are never used as fallback to avoid ambiguity.
    required: false
    default: 'true'

outputs:
  matrix:
    description: 'JSON string of the full service×environment matrix (backward compatible with create-deployment-matrix)'
  build_matrix:
    description: 'JSON string of the build matrix (one entry per service with images from kustomization.yaml)'
  deploy_matrix:
    description: 'JSON string of the deploy matrix (only auto_deploy entries from the full service×environment matrix)'

runs:
  using: 'node20'
  main: 'dist/index.js'
