name: 'Generate Service Matrix'
description: 'Generates build and deploy matrices from .skyhook/skyhook.yaml or .koala-monorepo.json'
author: 'Skyhook'
 
branding:
  icon: 'grid'
  color: 'purple'

inputs:
  overlay:
    description: 'The overlay/environment to use for kustomize (e.g., dev, staging, production). If not provided, all environments will be included.'
    required: false
  branch:
    description: 'The branch to use for deployment. If not provided, uses the remote default branch (HEAD).'
    required: false
  tag:
    description: 'The image tag to deploy'
    required: true
  github-token:
    description: 'GitHub token for API access'
    required: true
  repo-path:
    description: 'The path to the repo'
    required: false
    default: '.'

outputs:
  build_matrix:
    description: 'JSON string of the build matrix (one entry per service with images from kustomization.yaml)'
  deploy_matrix:
    description: 'JSON string of the deploy matrix (only auto_deploy entries from the full service×environment matrix)'

runs:
  using: 'node20'
  main: 'dist/index.js'
